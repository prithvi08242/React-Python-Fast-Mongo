name: integration-test

on:
  workflow_run:
    workflows:
      - github-actions-ci
    types:
      - completed

jobs:
  integration-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Get Artifact Download URL
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          ARTIFACT_URL=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name=="frontend-build") | .archive_download_url')

            if [ -z "$ARTIFACT_URL" ] || [ "$ARTIFACT_URL" = "null" ]; then
              echo "Artifact not found."
              exit 1
            fi

            echo "url=$ARTIFACT_URL" >> $GITHUB_OUTPUT    

      - name: Download Frontend Build Artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p frontend

          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ steps.artifact.outputs.url }}" \
            -o frontend-build.zip

      - name: Extract Frontend Build Artifact
        run: |
          unzip -o frontend-build.zip -d frontend/build
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python Dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Start Backend
        working-directory: backend
        run: |
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 --reload > uvicorn.log 2>&1 &

      - name: Wait for Backend to Start
        run: |
          echo "Waiting for backend to start..."

          for i in {1..30}; do
            if curl -fs http://localhost:8001/docs >/dev/null; then
              echo "Backend is up!"
              exit 0
            fi

            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "Backend failed to start."
          exit 1

      - name: Serve Frontend Build
        working-directory: frontend
        run: |
          nohup npx serve -s build -l 3000 > frontend.log 2>&1 &

      - name: Wait for Frontend to Start
        run: |
          echo "Waiting for frontend to start..."

          for i in {1..30}; do
            if curl -fs http://localhost:3000 >/dev/null; then
              echo "Frontend is up!"
              exit 0
            fi

            echo "Waiting... ($i/30)"
            sleep 2
          done

          echo "Frontend failed to start."
          exit 1

      - name: Backend Health Check
        run: |
          echo "Performing backend health check..."

          if curl -fs http://localhost:8001/docs >/dev/null; then
            echo "Backend health check passed!"
          else
            echo "Backend health check failed!"
            exit 1
          fi

      - name: Frontend Health Check
        run: |
          echo "Performing frontend health check..."

          if curl -fs http://localhost:3000 >/dev/null; then
            echo "Frontend health check passed!"
          else
            echo "Frontend health check failed!"
            exit 1
          fi

      - name: Run Smoke Tests
        working-directory: frontend
        run: |
          echo "Running smoke tests..."
          yarn test --watchAll=false --testPathPattern=smoke.test.js

      - name: Run API Tests
        working-directory: backend
        run: |
          echo "Running API tests..."
          pytest --maxfail=1 --disable-warnings -q

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            backend/uvicorn.log
            frontend/frontend.log
