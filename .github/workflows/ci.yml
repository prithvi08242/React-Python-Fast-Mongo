---
name: CI
on:
  push:
    branches:
      - feature/*
env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "24"
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend lint tools
        run: pip3 install black flake8

      - name: Black Format check
        working-directory: backend
        run: black --check .

      - name: Flake8 Lint
        working-directory: backend
        run: flake8 . --max-line-length=102 --extend-ignore=E203,W503

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Eslint frontend
        working-directory: frontend
        run: yarn eslint src --max-warnings=0
  
  backend-test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{env.PYTHON_VERSION}}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
   
      - name: start backend in background
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: practiceground_ci
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
        run: |
          nohup uvicorn server:app --host 0.0.0.0 --port 8001 > uvicorn.log 2>&1 &
          for i in {1..15}; do
            curl -sf http://localhost:8001/api/playground/health && break
            echo "Waiting for backend..."; sleep 2
          done
      - name: Run API tests (pytest)
        env:
          BASE_URL: http://localhost:8001
        run: pip install requests pytest && pytest tests/api -q
 
      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: backend-logs
          path: backend/uvicorn.log
    
  frontend-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Run Jest unit tests
        working-directory: frontend
        run: yarn test --watchAll=false

  e2e:
    needs: [lint, backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Build and start stack via docker-compose
        run: docker compose up --build -d
 
      - name: Wait for frontend to be ready
        run: |
          for i in {1..20}; do
            curl -sf http://localhost:8080 && break
            echo "Waiting for frontend..."; sleep 3
          done
 
      - name: Install Playwright
        run: npm i -D @playwright/test && npx playwright install --with-deps chromium
 
      - name: Run Playwright E2E tests
        env:
          BASE_URL: http://localhost:8080
        run: npx playwright test
 
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
 
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs
 
      - name: Tear down
        if: always()
        run: docker compose down -v

         